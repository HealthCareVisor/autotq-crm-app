<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AutoTQ CRM</title>
<style>
:root{
  --coral:#D85A30; --coral-d:#993C1D; --coral-t:#FAECE7; --coral-tt:#4A1B0C;
  --ink:#1d1c1a; --muted:#6b6a64; --hint:#9a9890;
  --bg:#f4f2ec; --surface:#ffffff; --line:#e7e4db;
  --warn-b:#FAEEDA; --warn-t:#854F0B; --dang-b:#FCEBEB; --dang-t:#A32D2D;
  --info-b:#E6F1FB; --info-t:#185FA5; --ok-b:#EAF3DE; --ok-t:#3B6D11;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:16px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);padding:0 0 92px;position:relative}
.topbar{position:sticky;top:0;z-index:5;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
.topbar h1{margin:0;font-size:22px;font-weight:600;letter-spacing:-.2px}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:1px}
.av{width:38px;height:38px;border-radius:50%;background:var(--coral);color:#fff;border:none;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center}
.main{padding:6px 16px 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px}
.ic{flex:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f0eee7;color:var(--muted)}
.ic svg{width:20px;height:20px}
.ic.warn{background:var(--warn-b);color:var(--warn-t)}
.ic.dang{background:var(--dang-b);color:var(--dang-t)}
.ic.info{background:var(--info-b);color:var(--info-t)}
.ic.ok{background:var(--ok-b);color:var(--ok-t)}
.ic.coral{background:var(--coral);color:#fff}
.grow{flex:1;min-width:0}
.t1{font-size:15px;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t2{font-size:13px;color:var(--muted);margin:1px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:11px;padding:9px 14px;font-size:14px;font-weight:500}
.btn:active{transform:scale(.97)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:10px}
.btn.coral{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600}
.btn.block{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:14px}
.btn.ghost{background:#f0eee7;border-color:transparent;color:var(--muted)}
.sectlabel{font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--hint);margin:18px 4px 8px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px}
.pill.warn{background:var(--warn-b);color:var(--warn-t)}
.pill.dang{background:var(--dang-b);color:var(--dang-t)}
.pill.ok{background:var(--ok-b);color:var(--ok-t)}
.pill.info{background:var(--info-b);color:var(--info-t)}
.pill.coral{background:var(--coral-t);color:var(--coral-tt)}
.pill.gray{background:#eceae3;color:var(--muted)}
.stchip{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:1px 7px;border-radius:6px;background:var(--info-b);color:var(--info-t);border:1px solid transparent;cursor:pointer;letter-spacing:.2px}
.stchip:hover{border-color:var(--info-t)}
svg.i{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav{position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:480px;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 6px 10px;z-index:20}
.nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--hint);font-size:11px;font-weight:500;padding:4px 0}
.nav button.on{color:var(--coral)}
.nav .plus{margin-top:-26px}
.nav .plus .bubble{width:54px;height:54px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(216,90,48,.4)}
.nav .plus .bubble svg{width:28px;height:28px}
.scrim{position:fixed;inset:0;background:rgba(20,18,16,.45);z-index:30;display:none;align-items:flex-end;justify-content:center}
.scrim.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:90vh;overflow:auto;padding:8px 18px 28px;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.sheet .handle{width:42px;height:5px;border-radius:3px;background:#d8d5cc;margin:8px auto 14px}
.sheet h2{margin:2px 0 6px;font-size:20px;font-weight:600}
label.fl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
input.f,select.f,textarea.f{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink)}
textarea.f{min-height:64px;resize:vertical}
input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--coral)}
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tile{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 2px;text-align:center;font-size:11px;font-weight:500;color:var(--muted)}
.tile svg{width:20px;height:20px;display:block;margin:0 auto 4px}
.tile.on{background:var(--coral-t);color:var(--coral-tt);border-color:var(--coral);box-shadow:inset 0 0 0 1px var(--coral)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:14px;color:var(--muted);font-weight:500}
.chip.on{background:var(--coral-t);color:var(--coral-tt);border-color:var(--coral)}
.hub{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;width:100%;text-align:left}
.hub svg.i{width:22px;height:22px;color:var(--coral)}
.hub b{font-size:16px;font-weight:600}
.fill{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:10px}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px;margin-top:11px}
.facts b{display:block;font-size:11px;color:var(--hint);font-weight:500}
.facts span{font-size:14px}
.bar{height:9px;border-radius:5px;background:#ece9e1;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--coral)}
.seg{display:flex;background:#ece9e1;border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted)}
.seg button.on{background:#fff;color:var(--ink)}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:#1d1c1a;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88%;text-align:center}
.toast.show{opacity:1}
.empty{text-align:center;color:var(--hint);padding:40px 20px;font-size:15px}
.banner{background:var(--coral-t);color:var(--coral-tt);font-size:12.5px;font-weight:500;border-radius:11px;padding:9px 12px;margin:2px 0 12px;display:flex;gap:8px;align-items:center}
.travel{display:flex;align-items:center;gap:10px;width:100%;background:#1d1c1a;color:#fff;border:none;border-radius:14px;padding:13px 16px;margin:2px 0 14px;font-size:15px;font-weight:600}
.travel svg{width:20px;height:20px}
.qa{display:flex;gap:6px}
.qa button{flex:none}
.login{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 26px}
.login .logo{font-size:34px;font-weight:700;letter-spacing:-.5px}
.login .logo span{color:var(--coral)}
.login .tag{color:var(--muted);font-size:15px;margin:4px 0 30px}
.login .who{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--hint);margin-bottom:12px}
.ubtn{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;width:100%;text-align:left}
.ubtn:active{transform:scale(.99)}
.uav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff}
.ubtn b{font-size:17px;font-weight:600;display:block}
.ubtn small{color:var(--muted);font-size:13px}

/* ===== Salesforce-style console (desktop) ===== */
.console{display:flex;min-height:100vh;background:var(--bg)}
.side{width:232px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{font-size:22px;font-weight:700;letter-spacing:-.4px;padding:18px 20px 12px}
.side .brand span{color:var(--coral)}
.side .brand small{display:block;font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-top:3px}
.side nav{display:flex;flex-direction:column;padding:6px 10px;gap:2px;flex:1;overflow-y:auto}
.side .grp{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--hint);padding:12px 12px 4px}
.side nav .grp:first-child{padding-top:4px}
.side nav button{display:flex;align-items:center;gap:12px;background:none;border:none;text-align:left;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14.5px;font-weight:500}
.side nav button svg{width:19px;height:19px;flex:none}
.side nav button:hover{background:#f5f3ec;color:var(--ink)}
.side nav button.on{background:var(--coral-t);color:var(--coral-tt);font-weight:600}
.side nav button.on svg{color:var(--coral)}
.side .su{border-top:1px solid var(--line);padding:12px;display:flex;align-items:center;gap:10px}
.side .su .av{width:36px;height:36px}
.side .su b{font-size:14px;font-weight:600;display:block;line-height:1.15}
.side .su small{font-size:11.5px;color:var(--muted)}
.work{flex:1;min-width:0;display:flex;flex-direction:column}
.tbar{flex:none;position:sticky;top:0;z-index:8;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 22px}
.tbar .crumb h1{margin:0;font-size:19px;font-weight:600;letter-spacing:-.2px}
.tbar .crumb .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.tbar .gs{flex:1;max-width:380px;margin-left:auto;position:relative}
.tbar .gs svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--hint)}
.tbar .gs input{width:100%;border:1px solid var(--line);background:#f7f5ef;border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;font-family:inherit;color:var(--ink)}
.tbar .gs input:focus{outline:none;border-color:var(--coral);background:#fff}
.tbar .btn.coral{display:inline-flex;align-items:center;gap:6px;flex:none}
.tbar .btn.coral svg{width:16px;height:16px}
.content{flex:1;padding:20px 22px 44px;max-width:1240px;width:100%}
/* list view */
.lvhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.lvtabs{display:flex;gap:6px;flex-wrap:wrap}
.lvtabs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--muted)}
.lvtabs button.on{background:var(--coral-t);color:var(--coral-tt);border-color:var(--coral)}
.lvsearch{margin-left:auto;position:relative}
.lvsearch input{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font-size:13.5px;font-family:inherit;min-width:210px;color:var(--ink)}
.lvsearch input:focus{outline:none;border-color:var(--coral)}
.lvselect{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 10px;font-size:13.5px;font-family:inherit;color:var(--ink);margin-right:8px}
.lvselect:focus{outline:none;border-color:var(--coral)}
.tablewrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}
table.lv{width:100%;border-collapse:collapse;font-size:13.5px}
table.lv th{text-align:left;font-size:11.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--hint);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:#faf9f5}
table.lv th.srt{cursor:pointer;user-select:none}
table.lv th.srt:hover{color:var(--muted)}
table.lv th.srt.on{color:var(--coral)}
table.lv td{padding:11px 14px;border-bottom:1px solid #f0eee7;white-space:nowrap;color:var(--ink);vertical-align:middle}
table.lv tr:last-child td{border-bottom:none}
table.lv tbody tr{cursor:pointer}
table.lv tbody tr:hover{background:#fbf7f4}
table.lv td.num{text-align:right;font-variant-numeric:tabular-nums}
.lvname{font-weight:600;color:var(--ink)}
.lvsub{color:var(--hint);font-size:12px;margin-top:1px}
.who{display:inline-flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap}
.who i{width:8px;height:8px;border-radius:50%;flex:none}
.muted{color:var(--hint)}
.reccard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.rechead{display:flex;align-items:center;gap:16px}
.recstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:14px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.recstats b{display:block;font-size:10.5px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.recstats span{font-size:18px;font-weight:600}
.lvtabs .cnt{font-weight:600;opacity:.6;margin-left:2px}
.hint-line{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:var(--coral-t);color:var(--coral-tt);border-radius:10px;padding:8px 12px;margin:0 0 12px}
.hint-line svg{width:15px;height:15px;flex:none}
.planbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.qa-input{flex:1;min-width:230px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink)}
.qa-input:focus{outline:none;border-color:var(--coral)}
.qa-types{display:flex;gap:5px;flex-wrap:wrap}
.qchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-size:12.5px;font-weight:600;color:var(--muted)}
.qchip.on{background:var(--coral-t);color:var(--coral-tt);border-color:var(--coral)}
.qa-date{border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:13px;font-family:inherit;color:var(--ink)}
.planbar .btn.coral{flex:none}
.tk{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-bottom:8px}
.tk.done{opacity:.72}
.tk .chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:#fff;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;padding:0}
.tk .chk.on{background:var(--ok-t);border-color:var(--ok-t)}
.tk .chk svg{width:14px;height:14px;stroke-width:3}
.tk .tkdel{border:none;background:none;color:var(--hint);font-size:20px;line-height:1;flex:none;padding:0 4px}
.tk .tkdel:hover{color:var(--dang-t)}
.sugg-act{display:flex;flex-direction:column;gap:6px;flex:none}
.enrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.enlbl{font-size:12px;color:var(--hint);font-weight:600;width:84px;flex:none}
.segchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--muted)}
.segchip.on{background:var(--coral);color:#fff;border-color:var(--coral)}
/* ===== KPI cards / dashboard / pipeline board / reports ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 14px}
.kpi b{display:block;font-size:10.5px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.kpi span{font-size:19px;font-weight:700;letter-spacing:-.3px}
.kpi small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
.pipe{display:flex;gap:10px;overflow-x:auto;align-items:flex-start;padding-bottom:10px}
.pcol{flex:1;min-width:216px;background:#edebe3;border-radius:14px;padding:8px 8px 4px}
.pcol>h4{margin:2px 4px 8px;font-size:12px;font-weight:600;color:var(--muted);display:flex;justify-content:space-between;gap:8px}
.pcol>h4 em{font-style:normal;color:var(--hint);font-weight:600}
.pcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.pcard:hover{border-color:var(--coral)}
.pcard .pn{font-size:13.5px;font-weight:600;line-height:1.25}
.pcard .pa{font-size:12px;color:var(--info-t);margin-top:2px}
.pcard .pm{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pcard .pv{font-size:14px;font-weight:700;margin-top:5px;display:flex;align-items:center;justify-content:space-between}
.pcard .adv{display:flex;gap:4px}
.pcard .adv button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:2px 8px;font-size:12px;color:var(--muted);line-height:1.4}
.pcard .adv button:hover{border-color:var(--coral);color:var(--coral)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 17px;min-width:0}
.dcard h3{margin:0 0 12px;font-size:13.5px;font-weight:600}
.hrow{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:12.5px}
.hrow .hl{width:108px;flex:none;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.hrow .ht{flex:1;height:14px;border-radius:4px;background:#f0eee7;overflow:hidden}
.hrow .ht i{display:block;height:100%;background:var(--coral);border-radius:4px}
.hrow .hv{width:64px;flex:none;font-weight:600;font-variant-numeric:tabular-nums}
.legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px}
.legend .lg{display:flex;align-items:center;gap:7px}
.legend .lg i{width:9px;height:9px;border-radius:3px;flex:none}
.legend .lg b{margin-left:auto;font-weight:600}
.dnut{display:flex;align-items:center;gap:18px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px 16px;margin-top:14px}
.detail-grid b{display:block;font-size:10.5px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.detail-grid span{font-size:14px;word-break:break-word}
.tl{border-left:2px solid var(--line);margin-left:9px;padding-left:16px}
.tl .tle{position:relative;padding-bottom:13px}
.tl .tle:before{content:"";position:absolute;left:-21.5px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--coral);border:2px solid #fff}
.tl .tle p{margin:0;font-size:13.5px}
.tl .tle .tls{font-size:12px;color:var(--hint)}
/* forecast matrix */
.fmx{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}
.fmx table{width:100%;border-collapse:collapse;font-size:13.5px}
.fmx th{font-size:11.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--hint);padding:11px 14px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;background:#faf9f5}
.fmx th:first-child{text-align:left}
.fmx td{padding:11px 14px;border-bottom:1px solid #f0eee7;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.fmx td:first-child{text-align:left;font-weight:600}
.fmx td.cell{cursor:pointer}
.fmx td.cell:hover{background:#fbf7f4}

const PWKEY="autotq_pw_known"; // emails that have a password set, per this device — picks the right login screen
function pwKnown(email){try{return !!(JSON.parse(localStorage.getItem(PWKEY)||"{}")[email]);}catch(e){return false;}}
function markPwKnown(email){try{const m=JSON.parse(localStorage.getItem(PWKEY)||"{}");m[email]=1;localStorage.setItem(PWKEY,JSON.stringify(m));}catch(e){}}
async function setPw(){
  const email=logState.pwEmail;
  const pw=(document.getElementById("pwInput").value||""), pw2=(document.getElementById("pwInput2").value||"");
  if(pw.length<6){loginMsg("Choose a password with at least 6 characters",true);return;}
  if(pw!==pw2){loginMsg("Those don't match — type the same password in both boxes",true);return;}
  loginMsg("Setting your password…");
  try{
    let res=await fetch(SUPA_URL+"/auth/v1/signup",{method:"POST",headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({email:email,password:pw})});
    let j=await res.json().catch(()=>({}));
    if(res.ok&&j.access_token){markPwKnown(email);toast("Password set — welcome in");finishLogin(j,email);return;}
    const em=(j.msg||j.message||j.error_description||"").toLowerCase();
    if(j.error_code==="user_already_exists"||em.indexOf("already registered")>=0||em.indexOf("already exists")>=0){
      // account exists — maybe they set this password on another device; try it as a sign-in
      res=await fetch(SUPA_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({email:email,password:pw})});
      j=await res.json().catch(()=>({}));
      if(res.ok&&j.access_token){markPwKnown(email);finishLogin(j,email);return;}
      logState.pwMode="enter";logState.pendingPw=pw;renderLogin();
      loginMsg("This account already has a password — enter it here. Forgotten? Tap “Email me a one-time code instead.”",true);return;
    }
    if(em.indexOf("signup")>=0&&(em.indexOf("disabled")>=0||em.indexOf("not allowed")>=0)){
      loginMsg("Password sign-in is switched off on the server — in Supabase turn on the Email provider with sign-ups allowed.",true);return;
    }
    if(res.ok&&j.user&&!j.access_token){
      loginMsg("Almost — the server wants email confirmation. In Supabase turn OFF “Confirm email” (Auth → Providers → Email), then set your password again.",true);return;
    }
    if(res.status===429||em.indexOf("rate limit")>=0){
      loginMsg("The server tried to send a confirmation email and hit its email limit. In Supabase turn OFF “Confirm email” (Authentication → Sign In / Providers → Email) — then this works instantly with no email at all.",true);return;
    }
    const detail=j.msg||j.message||j.error_description||(j.error&&j.error.message)||"";
    loginMsg((detail||"Couldn't set the password")+" (error "+res.status+(j.error_code?" · "+j.error_code:"")+") — try again",true);
  }catch(e){loginMsg("Network problem — try again",true);}
}
async function signInPw(){
  const email=logState.pwEmail, pw=(document.getElementById("pwInput").value||"");
  if(!pw){loginMsg("Type your password",true);return;}
  loginMsg("Signing in…");
  try{
    const res=await fetch(SUPA_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({email:email,password:pw})});
    const j=await res.json().catch(()=>({}));
    if(res.ok&&j.access_token){markPwKnown(email);finishLogin(j,email);return;}
    logState.pendingPw=pw;
    loginMsg("That password didn't work. Try again — or tap “Email me a one-time code instead” and the password you just typed will be saved once you're in.",true);
  }catch(e){loginMsg("Network problem — try again",true);}
}
async function sendOtp(email){
  const pwEl=document.getElementById("pwInput");
  if(pwEl&&pwEl.value.length>=6)logState.pendingPw=pwEl.value;
  loginMsg("Sending code…");
  try{
    const res=await fetch(SUPA_URL+"/auth/v1/otp",{method:"POST",headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({email:email,create_user:false})});
    if(!res.ok){const j=await res.json().catch(()=>({}));loginMsg(j.msg||j.error_description||"Couldn't send the code — try again",true);return;}
    logState.otpEmail=email;renderLogin();loginMsg("Code sent — check your email (and spam, the first time).");
  }catch(e){loginMsg("Network problem — try again",true);}
}
async function verifyOtp(){
  const code=(document.getElementById("otpCode").value||"").trim();
  if(code.length<6){loginMsg("Enter the 6-digit code",true);return;}
  loginMsg("Checking…");
  try{
    const res=await fetch(SUPA_URL+"/auth/v1/verify",{method:"POST",headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({type:"email",email:logState.otpEmail,token:code})});
    const j=await res.json();
    if(!res.ok||!j.access_token){loginMsg(j.msg||j.error_description||"That code didn't work — check it or send a fresh one",true);return;}
    const email=logState.otpEmail, pending=logState.pendingPw;
    saveSession(j);
    if(pending){ // migrate this account to the password they typed on the previous screen
      try{const r=await supa("/auth/v1/user",{method:"PUT",body:JSON.stringify({password:pending})});if(r.ok){markPwKnown(email);toast("Password saved — next time just type it");}}catch(e){}
    }
    finishLogin(j,email);
  }catch(e){loginMsg("Network problem — try again",true);}
}

function cmpv(a,b){if(typeof a==="number"&&typeof b==="number")return a-b;return String(a).localeCompare(String(b));}
function contactCountMap(){const m={};DB.people.forEach(p=>{if(p.cid)m[p.cid]=(m[p.cid]||0)+1;});return m;}
function thSort(tbl,key,lbl){const s=sortState[tbl];const on=s.key===key;return '<th class="srt'+(on?" on":"")+'" data-act="sort" data-tbl="'+tbl+'" data-key="'+key+'">'+lbl+(on?(s.dir>0?" ▲":" ▼"):"")+'</th>';}
function typeTag(t){return {distributor:'<span class="pill coral">Distributor</span>',manrep:'<span class="pill info">Man-rep</span>',partner:'<span class="pill info">Partner</span>',enduser:'<span class="pill gray">End-user</span>'}[t]||'<span class="pill gray">Account</span>';}
function ownerWho(o){if(!o)return '<span class="muted">—</span>';const t=teamById(o);return '<span class="who"><i style="background:'+t.c+'"></i>'+t.name.split(" ")[0]+'</span>';}
function ownerWhoBig(o){if(!o)return '<span class="pill gray">Unassigned</span>';const t=teamById(o);return '<span class="who" style="font-size:14px"><i style="background:'+t.c+'"></i>'+t.name.split(" ")[0]+'</span>';}
function lastTag(last){const cold=last===null||since(last)>30;return '<span class="pill '+(last===null?"dang":cold?"warn":"gray")+'">'+ago(last)+'</span>';}
function stat(b,v){return '<div><b>'+b+'</b><span>'+v+'</span></div>';}
function accountVal(c,key,cc){if(key==="name")return (c.name||"").toLowerCase();if(key==="type")return c.type||"";if(key==="territory")return companyRegion(c)||"~";if(key==="stage")return c.type==="distributor"?ESTAGES.indexOf(enableStage(c)):(c.stage||"~");if(key==="contacts")return cc[c.id]||0;if(key==="units")return c.units||0;if(key==="revenue")return c.revenue||0;if(key==="demos")return c.demoCount||0;return "";}
function contactVal(p,key){if(key==="name")return (p.name||"").toLowerCase();if(key==="account"){const c=company(p.cid);return (c?c.name:(p.branch||"")).toLowerCase();}if(key==="state")return personStates(p)[0]||"~";if(key==="region")return personRegion(p)||"~";if(key==="email")return (p.email||"~").toLowerCase();if(key==="phone")return p.phone||"~";if(key==="last")return p.last===null?1e15:since(p.last);return "";}
function accountRow(c,cc){const n=cc[c.id]||0;return '<tr data-act="roster" data-id="'+c.id+'">'+
  '<td><div class="lvname">'+esc(c.name)+'</div>'+((c.city||c.state)?'<div class="lvsub">'+esc(c.city||"")+(c.city&&c.state?", ":"")+(c.state?stateChip(c.state):"")+'</div>':'')+'</td>'+
  '<td>'+typeTag(c.type)+'</td>'+
  '<td>'+regionTag(companyRegion(c))+'</td>'+
  '<td>'+(c.type==="distributor"?stageTag(enableStage(c)):(c.stage?esc(c.stage):'<span class="muted">—</span>'))+'</td>'+
  '<td class="num">'+n+'</td>'+'<td class="num">'+(c.units||0)+'</td>'+
  '<td class="num">'+(c.revenue?money(c.revenue):'<span class="muted">—</span>')+'</td>'+
  '<td class="num">'+(c.demoCount||0)+'</td></tr>';}
function contactRow(p){const c=company(p.cid);const rb=roleBucket(p.role);return '<tr data-act="person" data-id="'+p.id+'">'+
  '<td><div class="lvname">'+esc(p.name)+' <span class="pill '+rb[1]+'" style="font-size:10px;padding:1px 7px;vertical-align:middle">'+rb[0]+'</span></div><div class="lvsub">'+esc(p.role||"")+'</div></td>'+
  '<td>'+esc(c?c.name:(p.branch||"—"))+'</td>'+
  '<td>'+(personStates(p).length?personStates(p).map(stateChip).join(" "):'<span class="muted">—</span>')+'</td>'+
  '<td>'+regionTag(personRegion(p))+'</td>'+
  '<td>'+(p.email?'<span class="muted">'+esc(p.email)+'</span>':'<span class="muted">—</span>')+'</td>'+
  '<td>'+(p.phone?esc(p.phone):'<span class="muted">—</span>')+'</td>'+
  '<td>'+lastTag(p.last)+'</td></tr>';}
function accountTableHTML(list,sortable){const cc=contactCountMap();
  function th(k,l){return sortable?thSort("accounts",k,l):'<th>'+l+'</th>';}
  const head='<tr>'+th("name","Account")+th("type","Type")+th("territory","Region")+th("stage","Stage")+th("contacts","Contacts")+th("units","Units")+th("revenue","Revenue")+th("demos","Demos")+'</tr>';
  return '<div class="tablewrap"><table class="lv"><thead>'+head+'</thead><tbody>'+list.map(c=>accountRow(c,cc)).join("")+'</tbody></table></div>';}
function contactTableHTML(list,sortable){
  function th(k,l){return sortable?thSort("contacts",k,l):'<th>'+l+'</th>';}
  const head='<tr>'+th("name","Contact")+th("account","Account")+th("state","State")+th("region","Region")+th("email","Email")+th("phone","Phone")+th("last","Last touch")+'</tr>';
  return '<div class="tablewrap"><table class="lv"><thead>'+head+'</thead><tbody>'+list.map(contactRow).join("")+'</tbody></table></div>';}

/* ---------- tasks + channel enablement ---------- */
function pad2(n){return (n<10?"0":"")+n;}
function ymd(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function todayStr(){return ymd(new Date());}
function ensureTasks(){
  if(!DB.tasks){
    DB.tasks=[];
    if(!window.REAL_DATA){ // demo-mode sample tasks only — never plant fakes on real data
      const T=todayStr(), tm=ymd(new Date(Date.now()+86400000));
      [["john","Call Fastenal Tahlequah — re-up the demo","call",T],
       ["jamie","Train 3 Ritz Safety reps before ASSP","train",T],
       ["max","Review Medique reorder","followup",T]
      ].forEach(r=>DB.tasks.push({id:uid(),owner:r[0],title:r[1],type:r[2],due:r[3],done:false,createdAt:new Date().toISOString()}));
    }
    save();
  }
}
function myTasks(){return DB.tasks.filter(t=>t.owner===USER);}
function taskTypeMeta(t){return {call:["phone","info","Call"],email:["mail","info","Email"],demo:["box","coral","Demo"],train:["school","ok","Train"],followup:["clock","warn","Follow-up"],todo:["check","gray","To-do"]}[t]||["check","gray","To-do"];}
function distStatus(c){if(c.dstatus)return c.dstatus;return (((c.units||0)>0)||((c.orders||0)>0)||["set up","active"].includes((c.stage||"").trim().toLowerCase()))?"setup":"potential";}
const ESTAGES=["Identified","Demoed","Trained","Selling","Scaling"];
function enableStage(c){if(c.estage)return c.estage;const o=c.orders||0,u=c.units||0,dm=c.demoCount||0;if(o>=2)return "Scaling";if(o>=1||u>0)return "Selling";if(dm>0)return "Demoed";return "Identified";}
function stageTag(s){const i=ESTAGES.indexOf(s);const cls=["gray","info","ok","coral","coral"][i]||"gray";return '<span class="pill '+cls+'">'+esc(s)+'</span>';}
function contactType(p){const c=company(p.cid);if(!c)return '';if(c.type==='manrep'||c.type==='partner')return 'manrep';if(c.type==='distributor')return 'distrep';if(c.type==='enduser')return 'enduser';return '';}
function roleBucket(r){r=(r||'').toLowerCase();
  if(/exec|vice president|\bvp\b|president|\bceo\b|\bcfo\b|\bcoo\b|owner|principal|founder|director|chief/.test(r))return ['Executive','info'];
  if(/safety|ehs|hse|hygien|health/.test(r))return ['Safety/EHS','ok'];
  if(/procure|purchas|buyer|sourcing/.test(r))return ['Procurement','warn'];
  if(/train/.test(r))return ['Trainer','coral'];
  if(/market/.test(r))return ['Marketing','info'];
  if(/operation|warehouse|logistic|\bops\b/.test(r))return ['Operations','gray'];
  if(/sales|account|\brep\b|bdm|branch|specialist|business develop|territory|outside|inside/.test(r))return ['Sales','coral'];
  return ['Contact','gray'];}
/* ---------- OPPORTUNITIES (Salesforce-style stages) ---------- */
const OPP_STAGES=["Prospecting","Qualification","Proposal/Price Quote","Negotiation","Closed Won","Closed Lost"];
const OPP_SHORT={"Prospecting":"Prospecting","Qualification":"Qualification","Proposal/Price Quote":"Proposal","Negotiation":"Negotiation","Closed Won":"Won","Closed Lost":"Lost"};
const OPP_PROB={"Prospecting":10,"Qualification":25,"Proposal/Price Quote":50,"Negotiation":75,"Closed Won":100,"Closed Lost":0};
function oppStageTag(s){const cls={"Prospecting":"gray","Qualification":"info","Proposal/Price Quote":"warn","Negotiation":"coral","Closed Won":"ok","Closed Lost":"dang"}[s]||"gray";return '<span class="pill '+cls+'">'+esc(OPP_SHORT[s]||s||"—")+'</span>';}
function val(id){const e=document.getElementById(id);return e?e.value.trim():"";}
function ensureOpps(){
  if(!DB.opps){
    DB.opps=[];
    if(window.REAL_DATA&&window.REAL_DATA.opps)DB.opps=window.REAL_DATA.opps.slice();
    save();
  }
}
function oppIsOpen(o){return o.stage!=="Closed Won"&&o.stage!=="Closed Lost";}
function oppProb(o){return typeof o.probability==="number"?o.probability:(OPP_PROB[o.stage]||0);}
function oppWeighted(o){return (o.amount||0)*oppProb(o)/100;}
function oppRegion(o){if(o.state)return regionFromState(o.state);const c=o.accountId?company(o.accountId):null;return c?companyRegion(c):"";}
function oppVisible(o){if(admin())return true;const r=oppRegion(o);return !r||inRegion(r)||o.owner===USER;}
function myOpps(){ensureOpps();return DB.opps.filter(oppVisible);}
function oppAcctLabel(o){const c=o.accountId?company(o.accountId):null;return c?c.name:(o.accountName||"—");}
function fmtK(n){n=Math.round(n||0);if(Math.abs(n)>=1e6)return "$"+(n/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";if(Math.abs(n)>=1e4)return "$"+Math.round(n/1e3)+"k";return "$"+n.toLocaleString();}
function oppAge(o){if(!o.createdAt)return null;return Math.max(0,Math.floor((Date.now()-new Date(o.createdAt))/86400000));}
function oppOverdue(o){return oppIsOpen(o)&&o.closeDate&&o.closeDate<todayStr();}
/* region model — contacts/accounts are East or West (no person owns a contact); Nationwide = multi-region account */
const EAST_STATES=new Set("ME VT NH MA RI CT NY NJ PA DE MD DC WV VA OH KY TN NC SC GA AL MS FL".split(" "));
function regionFromState(st){st=(st||"").trim().toUpperCase().slice(0,2);if(!st)return "";return EAST_STATES.has(st)?"East":"West";}
function personStates(p){if(Array.isArray(p.states)&&p.states.length)return p.states;return p.state?[p.state]:[];}
function regionFromStates(arr){if(!arr||!arr.length)return '';const r=new Set(arr.map(regionFromState).filter(Boolean));if(r.size>1)return 'Nationwide';return [...r][0]||'';}
function personRegion(p){return regionFromStates(personStates(p));}
function companyRegion(c){return c.territory?c.territory:regionFromState(c.state);}
function userRegion(u){return u==="john"?"West":(u==="jamie"?"East":null);}
function inRegion(region){if(admin())return true;const ur=userRegion(USER);if(!ur)return true;return region===ur||region==="Nationwide";}
function regionTag(region){if(!region)return '<span class="muted">—</span>';const cls={East:"info",West:"ok",Nationwide:"coral"}[region]||"gray";return '<span class="pill '+cls+'">'+region+'</span>';}

/* ---------- ACCOUNTS (list view) ---------- */
function viewAccounts(){
  const base=DB.companies.filter(c=>admin()||inRegion(companyRegion(c)));
  const cnt={potential:0,setup:0,enduser:0,manrep:0};
  base.forEach(c=>{
    if(c.type==="distributor")cnt[distStatus(c)]++;
    else if(c.type==="enduser")cnt.enduser++;
    else if(c.type==="manrep"||c.type==="partner")cnt.manrep++;
  });
  let pool=base.filter(c=>{
    if(acctFilter==="potential")return c.type==="distributor"&&distStatus(c)==="potential";
    if(acctFilter==="setup")return c.type==="distributor"&&distStatus(c)==="setup";
    if(acctFilter==="enduser")return c.type==="enduser";
    if(acctFilter==="manrep")return c.type==="manrep"||c.type==="partner";
    return true;
  });
  const q=listQ.trim().toLowerCase();
  if(q)pool=pool.filter(c=>(c.name||"").toLowerCase().includes(q)||(c.state||"").toLowerCase().includes(q)||(c.territory||"").toLowerCase().includes(q));
  const cc=contactCountMap(),s=sortState.accounts;
  pool=pool.slice().sort((a,b)=>cmpv(accountVal(a,s.key,cc),accountVal(b,s.key,cc))*s.dir);
  const tab=(v,l,n)=>'<button class="'+(acctFilter===v?"on":"")+'" data-act="acctfilter" data-v="'+v+'">'+l+' <span class="cnt">'+n+'</span></button>';
  let h='<div class="lvhead"><div class="lvtabs">'+
    tab("potential","Potential distributors",cnt.potential)+
    tab("setup","Set-up distributors",cnt.setup)+
    tab("enduser","End-user accounts",cnt.enduser)+
    tab("manrep","Man-reps",cnt.manrep)+'</div>'+
    '<div class="lvsearch"><input id="lvsearch" placeholder="Search this list…" value="'+esc(listQ)+'" autocomplete="off"></div></div>';
  if(acctFilter==="potential")h+='<div class="hint-line">'+svg("spark")+'Distributors you\'re working to onboard — move one to Set-up from its record once it\'s active.</div>';
  h+=pool.length?accountTableHTML(pool,true):'<div class="empty">No accounts here yet.</div>';
  return h;
}
/* ---------- CONTACTS (list view) ---------- */
function viewContacts(){
  const scoped=DB.people.filter(p=>admin()||inRegion(personRegion(p)));
  const cnt={manrep:0,distrep:0,enduser:0};
  scoped.forEach(p=>{const t=contactType(p);if(cnt[t]!=null)cnt[t]++;});
  let pool=scoped.filter(p=>contactType(p)===contactFilter);
  const stateOpts=[...new Set(pool.flatMap(p=>personStates(p)))].filter(Boolean).sort();
  if(contactStateF)pool=pool.filter(p=>personStates(p).includes(contactStateF));
  const q=listQ.trim().toLowerCase();
  if(q)pool=pool.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.email||"").toLowerCase().includes(q)||(p.branch||"").toLowerCase().includes(q)||(p.state||"").toLowerCase().includes(q)||(p.role||"").toLowerCase().includes(q));
  const s=sortState.contacts;
  pool=pool.slice().sort((a,b)=>cmpv(contactVal(a,s.key),contactVal(b,s.key))*s.dir);
  const tab=(v,l,n)=>'<button class="'+(contactFilter===v?"on":"")+'" data-act="contactfilter" data-v="'+v+'">'+l+' <span class="cnt">'+n+'</span></button>';

    tab("manrep","Man-reps",cnt.manrep)+tab("distrep","Distributor reps",cnt.distrep)+tab("enduser","End users",cnt.enduser)+'</div>'+
    '<div class="lvsearch"><select id="contactState" class="lvselect"><option value="">All states</option>'+stateOpts.map(x=>'<option'+(x===contactStateF?" selected":"")+'>'+x+'</option>').join("")+'</select>'+
    '<input id="lvsearch" placeholder="Search this list…" value="'+esc(listQ)+'" autocomplete="off"></div></div>';

}

/* ---------- HOME — rep dashboard ---------- */

   '<div class="kpi"><b>My pipeline</b><span>'+fmtK(open.reduce((s,o)=>s+(o.amount||0),0))+'</span><small>'+open.length+' open'+(overdue?' · '+overdue+' past due':'')+'</small></div>'+
   '<div class="kpi"><b>Tasks due</b><span>'+dueToday+'</span><small>today or overdue</small></div>'+
   '<div class="kpi"><b>Set-up distributors</b><span>'+setup.length+'</span><small>'+potN+' potential</small></div>'+
   '<div class="kpi"><b>Demos out</b><span>'+(DB.demos||[]).filter(d=>admin()||!regionFromState(d.state)||inRegion(regionFromState(d.state))).length+'</span></div>'+
  '</div>';
  h+=teamPulse();
  h+='<div class="planbar" style="margin-bottom:14px"><input class="qa-input" id="taskTitle" placeholder="Add an action for today…" autocomplete="off">'+
   '<div class="qa-types" id="taskTypes">'+[["call","Call"],["email","Email"],["demo","Demo"],["train","Train"],["followup","Follow-up"],["todo","To-do"]].map((t,i)=>'<span class="qchip'+((logState.taskType||"call")===t[0]?" on":"")+'" data-act="settask" data-v="'+t[0]+'">'+t[1]+'</span>').join("")+'</div>'+
   '<input type="date" class="qa-date" id="taskDue" value="'+T+'">'+
   '<button class="btn coral" data-act="addtask">Add</button></div>';

    h+='<div class="sectlabel">My day — '+tasks.filter(t=>!t.done).length+' open</div>';

  const confs=confLeadLists();

    h+='<div class="sectlabel">Conference reach-out</div>';

      const pct=cl.total?Math.round(cl.contacted/cl.total*100):0;

       '<div class="bar"><i style="width:'+pct+'%"></i></div></button>';
    }).join("");

function taskRow(t){
  const m=taskTypeMeta(t.type),T=todayStr(),overdue=!t.done&&t.due<T;
  const tag=t.done?'<span class="pill gray">done</span>':overdue?'<span class="pill dang">overdue '+t.due.slice(5)+'</span>':(t.due===T?'<span class="pill warn">today</span>':'<span class="pill info">'+t.due.slice(5)+'</span>');
  return '<div class="tk'+(t.done?" done":"")+'"><button class="chk'+(t.done?" on":"")+'" data-act="toggletask" data-id="'+t.id+'" aria-label="complete">'+(t.done?svg("check"):"")+'</button>'+

function teamPulse(){
  ensureUsage();
  const cut=Date.now()-7*86400000;
  const rows=TEAM.map(t=>{
    const acts=(DB.activities||[]).filter(a=>a.by===t.id&&a.date&&new Date(a.date)>=cut).length;
    const tks=(DB.tasks||[]).filter(k=>k.owner===t.id&&k.done&&k.completedAt&&new Date(k.completedAt)>=cut).length;
    const mins=DB.usage.filter(u=>u.user===t.id&&u.day&&new Date(u.day)>=cut).reduce((s,u)=>s+(u.mins||0),0);
    const last=[
      DB.usage.filter(u=>u.user===t.id).map(u=>u.ts||"").sort().pop()||"",
      (DB.activities||[]).filter(a=>a.by===t.id).map(a=>a.date||"").sort().pop()||"",
      (DB.tasks||[]).filter(k=>k.owner===t.id&&k.completedAt).map(k=>k.completedAt).sort().pop()||""
    ].sort().pop()||"";
    return {t:t,n:acts+tks,mins:mins,last:last};
  }).sort((a,b)=>b.n-a.n||b.mins-a.mins);
  const max=Math.max(1,...rows.map(r=>r.n));
  let h='<div class="sectlabel">Team pulse — last 7 days</div><div class="card" style="padding:12px 14px">';
  h+=rows.map(r=>{
    const pct=r.n?Math.max(6,Math.round(r.n/max*100)):0;
    return '<div class="row" style="margin:7px 0;gap:10px;align-items:center">'+
     '<span class="uav" style="background:'+r.t.c+';width:26px;height:26px;font-size:11px;flex:none">'+initials(r.t.name)+'</span>'+
     '<div class="grow"><div class="row" style="justify-content:space-between;gap:8px">'+
      '<p class="t1" style="font-size:13px">'+r.t.name.split(" ")[0]+(r.t.id===USER?' <span style="color:var(--hint);font-weight:400">(you)</span>':'')+'</p>'+
      '<p class="t2" style="font-size:12px;white-space:nowrap">'+r.n+' entr'+(r.n===1?"y":"ies")+' · '+fmtMins(r.mins)+' in app · '+agoShort(r.last)+'</p></div>'+
      '<div class="bar" style="margin-top:4px;height:6px"><i style="width:'+pct+'%;background:'+r.t.c+'"></i></div></div></div>';
  }).join("");
  return h+'</div>';
}

/* ---------- Excel-style part-number grid (per company) ---------- */
function ensurePnGrid(c){
  let dirty=false;
  if(!c.pnCols){c.pnCols=[{id:"c1",label:c.name.split(" ")[0]+" part #"}];dirty=true;}
  if(!c.pnData){
    c.pnData={};
    if(c.partNos){for(const k in c.partNos)c.pnData[k]={c1:c.partNos[k]};}
    dirty=true;
  }
  if(!c.pnRows){c.pnRows=[];dirty=true;}
  if(dirty)save();
}
function pnGridRows(c){ // catalog SKUs + this company's custom rows
  return (DB.skus||[]).map(s=>({key:s.id,mpn:s.mpn,name:s.name,upc:s.upc,custom:false}))
    .concat(c.pnRows.map(r=>({key:r.id,mpn:r.mpn,name:r.name,upc:"",custom:true})));
}

function confSchedule(){return (DB.conf&&DB.conf.length)?DB.conf:(window.CONF_SCHEDULE||[]);}
function confGoing(c){if(!c.state)return "";var r=regionFromState(c.state);return r==="East"?"Jamie (East)":(r==="West"?"John (West)":"");}
function fmtConfDate(c){
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var ABBR={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Sept:8,Oct:9,Nov:10,Dec:11,
            January:0,February:1,March:2,April:3,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  var d=String(c.dates||"").trim();
  var m=d.match(/^([A-Za-z]+)\s+(\d+)\s*[-–]\s*([A-Za-z]+)\s+(\d+)$/);
  if(m && ABBR[m[1]]!=null && ABBR[m[3]]!=null) return MONTHS[ABBR[m[1]]]+" "+m[2]+" - "+MONTHS[ABBR[m[3]]]+" "+m[4];
  m=d.match(/^([A-Za-z]+)\s+(\d+)\s*[-–]\s*(\d+)$/);
  if(m && ABBR[m[1]]!=null) return MONTHS[ABBR[m[1]]]+" "+m[2]+" - "+MONTHS[ABBR[m[1]]]+" "+m[3];
  if(c.start){var p=c.start.split("-"); if(p.length===3) return MONTHS[parseInt(p[1],10)-1]+" "+parseInt(p[2],10);}
  return "";
}
function confCountdown(c){
  if(!c.start)return "";
  var t=new Date(); t.setHours(0,0,0,0);
  var s=new Date(c.start+"T00:00:00");
  var days=Math.round((s-t)/86400000);
  if(days<0)return "";
  if(days===0)return "Today";
  if(days===1)return "1 day";
  return days+" days";
}
function confLeadsFor(name){
  var lists=confLeadLists();
  for(var i=0;i<lists.length;i++){var w=lists[i].conf.split(" ")[0].toLowerCase();
    if(String(name||"").toLowerCase().indexOf(w)>-1)return lists[i];}
  return null;
}
function confCard(c,isPast,last){

  var cityState=c.loc&&c.state?esc(c.loc)+", "+stateChip(c.state):(c.state?stateChip(c.state):esc(c.loc||""));
  var when=fmtConfDate(c);

    (cd?'<span class="pill coral" style="margin-right:8px;align-self:center;white-space:nowrap">'+cd+'</span>':'')+

    (meta||c.link?'<p class="t2" style="margin:8px 0 0 52px;white-space:normal">'+esc(meta)+(c.link?(meta?' · ':'')+'<a href="'+esc(c.link)+'" target="_blank" rel="noopener" style="color:var(--info-t)">details</a>':"")+'</p>':"")+
    (leads?'<button class="btn sm coral" data-act="confleads" data-conf="'+esc(leads.conf)+'" style="margin:10px 0 0 52px">'+svg("users")+' '+leads.total+' leads · '+leads.tocall+' to call</button>':"")+
    '</div>';
}
function viewConf(){
  var list=confSchedule(); if(!list.length)return '<div class="empty">No conference schedule loaded.</div>';
  var today=todayStr();
  var up=list.filter(function(c){return (c.start||"")>=today;});
  var past=list.filter(function(c){return (c.start||"")<today;});
  var last=past.length?past[past.length-1].name:"";
  var h='<div class="banner">'+svg("spark")+'Conferences are assigned by location — East → Jamie, West → John. Leads from shows respond well to calling.</div>';
  h+='<div class="sectlabel">Upcoming · '+up.length+'</div>';

  if(past.length){h+='<div class="sectlabel" style="margin-top:20px">Past · '+past.length+'</div>';
    h+=past.slice().reverse().map(function(c){return confCard(c,true,last);}).join("");}
  return h;
}

/* ---------- RESOURCES (file library — shared: metadata syncs, blobs live in team storage) ---------- */
let RES=[];
const RES_CATS=["Literature","Price list","Training","Contract","Company doc","Other"];
function resCache(){return new Promise((ok,bad)=>{const q=indexedDB.open("autotq_blobcache",1);
  q.onupgradeneeded=()=>q.result.createObjectStore("blobs",{keyPath:"id"});
  q.onsuccess=()=>ok(q.result);q.onerror=()=>bad(q.error);});}
function cacheGet(id){return resCache().then(db=>new Promise(ok=>{const q=db.transaction("blobs").objectStore("blobs").get(id);q.onsuccess=()=>ok(q.result?q.result.blob:null);q.onerror=()=>ok(null);}));}
function cachePut(id,blob){return resCache().then(db=>new Promise(ok=>{const tx=db.transaction("blobs","readwrite");tx.objectStore("blobs").put({id:id,blob:blob});tx.oncomplete=ok;tx.onerror=ok;}));}
function cacheDel(id){return resCache().then(db=>new Promise(ok=>{const tx=db.transaction("blobs","readwrite");tx.objectStore("blobs").delete(id);tx.oncomplete=ok;tx.onerror=ok;}));}
function resRefresh(){DB.resources=DB.resources||[];RES=DB.resources.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));return Promise.resolve(RES);}
async function resPut(rec){
  DB.resources=DB.resources||[];
  const meta=Object.assign({},rec);delete meta.blob;
  if(rec.blob){
    meta.path=rec.id+"/"+rec.name;
    const res=await supa("/storage/v1/object/resources/"+encodeURIComponent(meta.path).replace(/%2F/g,"/"),
      {method:"POST",headers:{"Content-Type":rec.blob.type||"application/octet-stream","x-upsert":"true"},body:rec.blob});
    if(!res.ok)throw new Error("upload failed");
    cachePut(rec.id,rec.blob);
  }
  const i=DB.resources.findIndex(r=>r.id===meta.id);
  if(i>-1)DB.resources[i]=meta;else DB.resources.push(meta);
  save();return meta;
}
async function resRemove(id){
  const r=(DB.resources||[]).find(x=>x.id===id);
  if(r&&r.path)await supa("/storage/v1/object/resources/"+encodeURIComponent(r.path).replace(/%2F/g,"/"),{method:"DELETE"}).catch(()=>{});
  DB.resources=(DB.resources||[]).filter(x=>x.id!==id);
  cacheDel(id);save();
}
function fmtBytes(n){if(!n)return"—";if(n>=1048576)return(n/1048576).toFixed(1)+" MB";if(n>=1024)return Math.round(n/1024)+" KB";return n+" B";}
function resIcon(name){return /\.pdf$/i.test(name)?"file":/\.(png|jpe?g|gif|webp|heic)$/i.test(name)?"pin":/\.(xlsx?|csv)$/i.test(name)?"chart":"note";}
let curFolder=null; // null = library root
let resLayout=localStorage.getItem("autotq_res_layout")||"grid";
function resFolders(parent){return RES.filter(r=>r.kind==="folder"&&(r.parent||null)===(parent||null)).sort((a,b)=>a.name.localeCompare(b.name));}
function resFiles(folderId){return RES.filter(r=>r.kind!=="folder"&&(r.folderId||null)===(folderId||null));}
function folderStats(id){ // recursive: files, bytes, latest date, direct subfolders
  const st={folders:resFolders(id).length,files:0,bytes:0,last:""};
  (function walk(fid){
    resFiles(fid).forEach(f=>{st.files++;st.bytes+=(f.size||0);if((f.date||"")>st.last)st.last=f.date;});
    resFolders(fid).forEach(sub=>{if((sub.date||"")>st.last)st.last=sub.date;walk(sub.id);});
  })(id);
  return st;
}
function folderPreview(id){ // a few content names for the tile
  const names=resFolders(id).map(f=>f.name+"/").concat(resFiles(id).map(f=>f.name));
  return names.slice(0,3).join(" · ")+(names.length>3?" · +"+(names.length-3)+" more":"");
}
function folderTile(f){
  const st=folderStats(f.id);
  const meta=[st.folders?st.folders+" folder"+(st.folders>1?"s":""):"",st.files?st.files+" file"+(st.files>1?"s":""):""].filter(Boolean).join(" · ")||"Empty";
  const sub=[st.bytes?fmtBytes(st.bytes):"",st.last?"updated "+st.last.slice(0,10):""].filter(Boolean).join(" · ");
  const pv=folderPreview(f.id);
  return '<button class="rtile" data-act="openfolder" data-id="'+esc(f.id)+'"><span class="hicon">'+svg("folder")+'</span>'+
   '<h4 title="'+esc(f.name)+'">'+esc(f.name)+'</h4>'+
   '<div class="hmeta">'+esc(meta)+(sub?'<br>'+esc(sub):'')+'</div>'+
   (pv?'<div class="hsub">'+esc(pv)+'</div>':'')+'</button>';
}
function folderRow(f){
  const st=folderStats(f.id);
  const meta=[st.folders?st.folders+" folders":"",st.files?st.files+" files":"",st.bytes?fmtBytes(st.bytes):"",st.last?"updated "+st.last.slice(0,10):""].filter(Boolean).join(" · ")||"Empty";
  return '<button class="rrow" data-act="openfolder" data-id="'+esc(f.id)+'"><span class="hicon">'+svg("folder")+'</span>'+
   '<span class="grow" style="min-width:0"><b>'+esc(f.name)+'</b><small>'+esc(meta)+'</small></span><span class="chev">›</span></button>';
}
function folderById(id){return RES.find(r=>r.kind==="folder"&&r.id===id);}
function folderCount(id){return resFolders(id).length+resFiles(id).length;}
function folderPath(id){const out=[];let f=folderById(id);let hop=0;while(f&&hop++<12){out.unshift(f);f=f.parent?folderById(f.parent):null;}return out;}
function allFolderOptions(){ // flattened, indented, for the upload sheet
  const out=[];(function walk(parent,depth){resFolders(parent).forEach(f=>{out.push({id:f.id,label:"  ".repeat(depth)+f.name});walk(f.id,depth+1);});})(null,0);
  return out;
}
function fileCard(r){
  const c=r.cid?company(r.cid):null;
  return '<div class="card"><div class="row"><span class="ic info">'+svg(resIcon(r.name))+'</span>'+
   '<div class="grow"><p class="t1" style="font-size:14.5px">'+esc(r.name)+'</p>'+
   '<p class="t2"><span class="pill gray" style="font-size:11px">'+esc(r.cat||"File")+'</span> '+fmtBytes(r.size)+' · '+esc((r.date||"").slice(0,10))+' · '+esc(teamById(r.by).name.split(" ")[0])+
   (c?' · <a href="#" data-act="roster" data-id="'+c.id+'" style="color:var(--info-t)">'+esc(c.name)+'</a>':'')+'</p></div>'+
   '<div class="qa"><button class="btn sm coral" data-act="resdl" data-id="'+esc(r.id)+'">'+svg("dl")+' Open</button>'+
   '<button class="btn sm" data-act="resdel" data-id="'+esc(r.id)+'" style="color:var(--dang-t)">Delete</button></div></div></div>';
}
function viewResources(){
  const path=folderPath(curFolder);
  const folders=resFolders(curFolder), files=resFiles(curFolder);
  let h='<div class="crumbbar">'+
   (curFolder?'<button data-act="openfolder" data-id="">'+svg("folder")+' Resources</button>':'<b>'+svg("folder")+' Resources</b>')+
   path.map((f,i)=>'<span class="sep">/</span>'+(i===path.length-1?'<b>'+esc(f.name)+'</b>':'<button data-act="openfolder" data-id="'+esc(f.id)+'">'+esc(f.name)+'</button>')).join("")+
   '<span style="margin-left:auto"></span>'+
   (curFolder&&!folderCount(curFolder)?'<button class="btn sm" data-act="foldel" data-id="'+esc(curFolder)+'" style="color:var(--dang-t)">Delete folder</button>':'')+
   '<div class="seg" style="margin:0;max-width:150px"><button class="'+(resLayout==="grid"?"on":"")+'" data-act="reslayout" data-v="grid" title="Squares">⊞</button><button class="'+(resLayout==="list"?"on":"")+'" data-act="reslayout" data-v="list" title="List">☰</button></div>'+
   '<button class="btn coral" data-act="resupload">'+svg("plus")+' Upload here</button></div>';
  if(resLayout==="grid"){
    h+='<div class="rgrid">'+folders.map(folderTile).join("")+
     '<button class="rtile new" data-act="newbubble">'+svg("plus")+'New bubble</button></div>';
  }else{

     '<button class="rrow" data-act="newbubble" style="border-style:dashed;background:transparent"><span class="hicon" style="background:transparent;color:var(--hint)">'+svg("plus")+'</span><span class="grow"><b style="color:var(--muted)">New bubble</b><small>Create a folder here</small></span></button></div>';
  }
  if(!files.length&&!folders.length){
    h+='<div class="empty">'+(curFolder?'This folder is empty — upload files here or add a sub-bubble.':'The library is empty.<br>Make a bubble per distributor (Grainger, Fastenal…) or per topic, then push sub-folders and files into it — SharePoint style.<br><br><span style="font-size:12.5px">Files are stored in this browser on this device.</span>')+'</div>';
    return h;
  }
  if(files.length){
    h+='<div class="sectlabel" style="margin-top:2px">Files · '+files.length+'</div>';

function saveResources(){
  const inp=document.getElementById("resFile");
  const files=inp?Array.from(inp.files):[];
  if(!files.length){toast("Pick at least one file");return;}
  const cat=document.getElementById("resCat").value, cid=document.getElementById("resCid").value||null;
  const folderId=document.getElementById("resFolder").value||null;
  Promise.all(files.map(f=>resPut({id:uid(),name:f.name,size:f.size,mime:f.type,cat:cat,cid:cid,folderId:folderId,by:USER,date:new Date().toISOString(),blob:f})))
   .then(resRefresh).then(()=>{closeSheet();curFolder=folderId;render();toast(files.length+" file"+(files.length>1?"s":"")+" added to the team library");})
   .catch(()=>toast("Upload failed — check your connection (50 MB max per file)"));
}
async function resOpen(id){
  const r=RES.find(x=>x.id===id);if(!r)return;
  let blob=await cacheGet(id);
  if(!blob){
    if(!r.path){toast("This file has no content — re-upload it");return;}
    toast("Fetching from the team library…");
    const res=await supa("/storage/v1/object/resources/"+encodeURIComponent(r.path).replace(/%2F/g,"/"));
    if(!res.ok){toast("Couldn't fetch the file — check your connection");return;}
    blob=await res.blob();cachePut(id,blob);
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  if(/\.(pdf|png|jpe?g|gif|webp)$/i.test(r.name))a.target="_blank";else a.download=r.name;
  a.click();setTimeout(()=>URL.revokeObjectURL(url),30000);
}

function confLeadLists(){
  const by={};(DB.confLeads||[]).forEach(l=>{(by[l.conf]=by[l.conf]||[]).push(l);});
  return Object.keys(by).map(conf=>{
    const ls=by[conf];
    return {conf:conf,total:ls.length,contacted:ls.filter(l=>l.contacted).length,
      tocall:ls.filter(l=>!l.contacted&&l.segment!=="Set Aside").length,
      hot:ls.filter(l=>l.temp==="Hot").length};
  });
}
function leadTempTag(t){
  const cls={Hot:"dang",Warm:"warn",Interested:"info","Interested (no budget)":"info",Voicemail:"gray",New:"gray"}[t]||"gray";
  return '<span class="pill '+cls+'">'+esc(t||"New")+'</span>';
}
function leadVal(l,key){
  if(key==="name")return (l.name||"").toLowerCase();
  if(key==="company")return (l.company||"").toLowerCase();
  if(key==="title")return (l.title||"").toLowerCase();
  if(key==="state")return l.state||"~";
  if(key==="region")return l.region||"~";
  if(key==="temp")return ["Hot","Warm","Interested","Interested (no budget)","Voicemail","Shared line","New"].indexOf(l.temp);
  if(key==="status")return (l.status||"").toLowerCase();
  return "";
}

function promoteLead(id){
  const l=leadById(id);if(!l||l.promoted)return;
  const cname=(l.company||l.name).trim();
  const key=cname.toLowerCase().replace(/[^a-z0-9]/g,"");
  let c=DB.companies.find(x=>x.name.toLowerCase().replace(/[^a-z0-9]/g,"")===key);
  if(!c){
    c={id:uid(),name:cname,type:(l.segment==="Distributor/Rep"?"distributor":"enduser"),
       territory:regionFromState(l.state),owner:"",stage:"",website:"",industry:"",
       city:l.city||"",state:l.state||"",note:"From "+l.conf+" lead list",segment:"",
       units:0,revenue:0,orders:0,lastOrder:"",demoCount:0};
    DB.companies.unshift(c);
  }
  let p=l.email?DB.people.find(x=>(x.email||"").toLowerCase()===l.email):null;
  if(!p){
    p={id:uid(),name:l.name,cid:c.id,branch:c.name,role:l.title||"Contact",
       city:l.city||"",state:l.state||"",units:0,pos:0,last:l.contacted?new Date().toISOString():null,
       owner:"",email:l.email||"",phone:l.phone||"",
       note:[l.conf+" lead",l.status!=="Not contacted"?l.status:"",l.notes].filter(Boolean).join(" | ")};
    DB.people.unshift(p);
  }
  l.promoted=true;save();closeSheet();
  curPerson=p.id;view="person";render();window.scrollTo(0,0);
  toast(l.name+" added to Contacts"+(c?" @ "+c.name:""));
}
function saveLead(){
  const l=leadById(logState.leadId);if(!l)return;
  l.contacted=logState.leadC==="Yes";l.temp=logState.leadT||l.temp;
  l.status=val("ldStatus")||l.status;l.next=val("ldNext");
  if(l.contacted&&l.status==="Not contacted")l.status="Contacted";
  save();closeSheet();render();toast(l.name+" updated");
}

function oppVal(o,key){
  if(key==="name")return (o.name||"").toLowerCase();
  if(key==="account")return oppAcctLabel(o).toLowerCase();
  if(key==="stage")return OPP_STAGES.indexOf(o.stage);
  if(key==="amount")return o.amount||0;

function oppKpis(pool){
  const open=pool.filter(oppIsOpen), won=pool.filter(o=>o.stage==="Closed Won"), lost=pool.filter(o=>o.stage==="Closed Lost");

  const wonAmt=won.reduce((s,o)=>s+(o.amount||0),0);
  const winRate=(won.length+lost.length)?Math.round(won.length/(won.length+lost.length)*100):null;
  return '<div class="kpis">'+
   '<div class="kpi"><b>Open pipeline</b><span>'+fmtK(openAmt)+'</span><small>'+open.length+' deals</small></div>'+
   '<div class="kpi"><b>Weighted forecast</b><span>'+fmtK(wAmt)+'</span><small>probability-adjusted</small></div>'+
   '<div class="kpi"><b>Closed won</b><span>'+fmtK(wonAmt)+'</span><small>'+won.length+' deals</small></div>'+
   '<div class="kpi"><b>Win rate</b><span>'+(winRate===null?"—":winRate+"%")+'</span><small>'+won.length+'W / '+lost.length+'L</small></div>'+
  '</div>';
}

/* ---------- FORECASTS (Salesforce-style category × period) ---------- */
const FCATS=[
 {key:"closed",label:"Closed",c:"#3B6D11",stages:["Closed Won"]},
 {key:"commit",label:"Commit",c:"#D85A30",stages:["Negotiation"]},
 {key:"best",label:"Best case",c:"#854F0B",stages:["Proposal/Price Quote"]},
 {key:"pipeline",label:"Pipeline",c:"#185FA5",stages:["Prospecting","Qualification"]}
];
function fcatOf(o){if(o.stage==="Closed Lost")return "omitted";const f=FCATS.find(f=>f.stages.includes(o.stage));return f?f.key:"pipeline";}
function fPeriod(o){
  if(o.closeDate){const y=o.closeDate.slice(0,4),q=Math.floor((parseInt(o.closeDate.slice(5,7),10)-1)/3)+1;return "Q"+q+" "+y;}
  return o.forecastYear?("FY "+o.forecastYear):"No date";
}
function fPeriodSort(p){
  if(p==="No date")return "9999z";
  if(p.startsWith("FY "))return p.slice(3)+"y";
  const m=p.match(/^Q(\d) (\d{4})$/);return m?m[2]+"q"+m[1]:p;
}
let fSel=null; // {cat, period} — selected matrix cell
function viewForecast(){
  if(!myOpps().length)return '<div class="empty">No deals in the pipeline yet.<br>Forecasts build themselves as you add opportunities — tap <b>New</b> (or the + button) and pick Opportunity.<br><br><span style="font-size:12.5px">The old imported pipeline is archived at CRM_Cleanup/opportunities_import_archive.csv if you need to reference it.</span></div>';
  const pool=myOpps().filter(o=>o.stage!=="Closed Lost");
  const periods=[...new Set(pool.map(fPeriod))].sort((a,b)=>fPeriodSort(a).localeCompare(fPeriodSort(b)));
  const cell={};pool.forEach(o=>{const k=fcatOf(o)+"|"+fPeriod(o);(cell[k]=cell[k]||[]).push(o);});
  const sum=os=>os.reduce((s,o)=>s+(o.amount||0),0);
  const catTotal={};FCATS.forEach(f=>catTotal[f.key]=sum(pool.filter(o=>fcatOf(o)===f.key)));
  const commitFc=catTotal.closed+catTotal.commit;
  const weighted=pool.filter(oppIsOpen).reduce((s,o)=>s+oppWeighted(o),0);
  let h='<div class="kpis">'+
   '<div class="kpi"><b>Forecast (closed + commit)</b><span>'+fmtK(commitFc)+'</span><small>what we\'d call the quarter at</small></div>'+
   '<div class="kpi"><b>Best case</b><span>'+fmtK(commitFc+catTotal.best)+'</span><small>+ proposals on the table</small></div>'+
   '<div class="kpi"><b>Weighted pipeline</b><span>'+fmtK(weighted)+'</span><small>probability-adjusted</small></div>'+
   '<div class="kpi"><b>Total funnel</b><span>'+fmtK(sum(pool))+'</span><small>'+pool.length+' deals</small></div></div>';
  h+='<div class="fmx"><table><thead><tr><th>Forecast category</th>'+periods.map(p=>'<th>'+esc(p)+'</th>').join("")+'<th>Total</th></tr></thead><tbody>';
  FCATS.forEach(f=>{
    h+='<tr><td><span class="fcat"><i style="background:'+f.c+'"></i>'+f.label+'</span></td>';
    periods.forEach(p=>{
      const os=cell[f.key+"|"+p]||[];
      const on=fSel&&fSel.cat===f.key&&fSel.period===p;
      h+='<td class="cell'+(on?" on":"")+'" data-act="fcell" data-cat="'+f.key+'" data-period="'+esc(p)+'">'+(os.length?money(sum(os))+'<small>'+os.length+' deal'+(os.length>1?'s':'')+'</small>':'<span class="muted">—</span>')+'</td>';
    });
    h+='<td style="font-weight:700">'+money(catTotal[f.key])+'</td></tr>';
  });
  h+='<tr class="total"><td>Total</td>'+periods.map(p=>{
    const os=pool.filter(o=>fPeriod(o)===p);
    return '<td>'+money(sum(os))+'</td>';}).join("")+'<td>'+money(sum(pool))+'</td></tr>';
  const lost=myOpps().filter(o=>o.stage==="Closed Lost");
  if(lost.length)h+='<tr class="muted"><td>Omitted (lost)</td><td colspan="'+periods.length+'"></td><td>'+money(sum(lost))+'</td></tr>';
  h+='</tbody></table></div>';
  h+='<p style="font-size:12.5px;color:var(--hint);margin:10px 2px 0">Closed = won · Commit = in negotiation · Best case = quoted/proposal out · Pipeline = still qualifying. Deals without a close date sit in their forecast-year bucket — set close dates from the deal to tighten this.</p>';
  if(fSel){
    const os=(cell[fSel.cat+"|"+fSel.period]||[]).slice().sort((a,b)=>(b.amount||0)-(a.amount||0));
    const f=FCATS.find(x=>x.key===fSel.cat);
    h+='<div class="lvhead" style="margin-top:18px"><div class="lvtabs"><button class="on">'+(f?f.label:fSel.cat)+' · '+esc(fSel.period)+' · '+os.length+'</button></div>'+
       '<button class="btn sm ghost" data-act="fcell" data-cat="" data-period="" style="margin-left:auto">Clear</button></div>';
    h+=os.length?oppTableHTML(os,false):'<div class="empty">No deals in this cell.</div>';
  }
  return h;
}

/* ---------- DASHBOARD ---------- */
function hbars(rows,fmt){
  if(!rows.length)return '<div class="empty" style="padding:14px">No data yet.</div>';
  const top=Math.max(...rows.map(r=>r.v))||1;
  fmt=fmt||(v=>String(v));
  return rows.map(r=>'<div class="hrow"><span class="hl" title="'+esc(r.l)+'">'+esc(r.l)+'</span><span class="ht"><i style="width:'+Math.max(2,Math.round(r.v/top*100))+'%'+(r.c?';background:'+r.c:'')+'"></i></span><span class="hv">'+fmt(r.v)+'</span></div>').join("");
}
function donutSVG(segs){
  const total=segs.reduce((s,x)=>s+x.v,0);
  if(!total)return '<div class="empty" style="padding:14px">No data yet.</div>';
  let acc=0;const R=34,C=2*Math.PI*R;
  const arcs=segs.map(s=>{const f=s.v/total,off=C*(1-acc),len=C*f;acc+=f;
    return '<circle r="'+R+'" cx="45" cy="45" fill="none" stroke="'+s.c+'" stroke-width="14" stroke-dasharray="'+len.toFixed(1)+' '+(C-len).toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 45 45)"/>';}).join("");
  const legend=segs.map(s=>'<span class="lg"><i style="background:'+s.c+'"></i>'+esc(s.l)+'<b>'+s.f+'</b></span>').join("");
  return '<div class="dnut"><svg width="90" height="90" viewBox="0 0 90 90">'+arcs+'</svg><div class="legend">'+legend+'</div></div>';
}

/* ---------- DISTRIBUTOR VOLUME ---------- */
function viewInsights(){
  const dist=DB.companies.filter(c=>c.type==="distributor"&&(admin()||inRegion(companyRegion(c))));
  const pool=dist.filter(c=>(c.units||0)>0||(c.orders||0)>0||(c.demoCount||0)>0)
    .sort((a,b)=>(b.units||0)-(a.units||0)||(b.revenue||0)-(a.revenue||0));
  const units=pool.reduce((s,c)=>s+(c.units||0),0), rev=pool.reduce((s,c)=>s+(c.revenue||0),0);
  const orders=pool.reduce((s,c)=>s+(c.orders||0),0), demos=pool.reduce((s,c)=>s+(c.demoCount||0),0);
  let h='<div class="kpis">'+
   '<div class="kpi"><b>Units through distributors</b><span>'+units+'</span></div>'+
   '<div class="kpi"><b>Revenue</b><span>'+fmtK(rev)+'</span></div>'+
   '<div class="kpi"><b>Orders</b><span>'+orders+'</span></div>'+
   '<div class="kpi"><b>Demo units picked up</b><span>'+demos+'</span><small>across '+pool.filter(c=>c.demoCount).length+' distributors</small></div></div>';
  if(!pool.length)return h+'<div class="empty">No distributor volume yet.</div>';
  const top=pool[0].units||1;
  h+='<div class="sectlabel">Distributor volume — units bought &amp; demos picked up</div>';
  h+=pool.map((c,i)=>'<button class="card" style="width:100%;text-align:left" data-act="roster" data-id="'+c.id+'"><div class="row" style="margin-bottom:8px"><span class="ic '+(i===0?"coral":"ware")+'">'+(i<3?(i+1):svg("ware"))+'</span>'+
    '<div class="grow"><p class="t1">'+esc(c.name)+'</p>'+
    '<p class="t2">'+money(c.revenue||0)+' · '+(c.orders||0)+' order'+((c.orders||0)===1?'':'s')+(c.lastOrder?' · last '+esc(c.lastOrder):'')+(c.demoCount?' · '+c.demoCount+' demo unit'+(c.demoCount>1?'s':'')+' out':'')+'</p></div>'+
    '<div style="text-align:right;font-weight:600">'+(c.units||0)+'u</div></div>'+
    '<div class="bar"><i style="width:'+Math.max(2,Math.round((c.units||0)/top*100))+'%"></i></div></button>').join("");
  h+='<button class="btn block" data-act="export" style="margin-top:10px">'+svg("dl")+' Export to CSV</button>';
  return h;
}

   ["Volume","Distributor volume — units bought, revenue, orders and the demo units they've picked up."],
   ["Resources","The company file library — make a bubble (folder) per distributor or topic, nest sub-folders SharePoint-style, upload literature and price lists."],
   ["Conferences","The show calendar; shows with lead lists link straight to the call list."]
  ];
  openSheet('<h2>How this CRM works</h2>'+
   '<p style="color:var(--muted);font-size:14px;margin:4px 0 10px">AutoTQ sells through a channel: <b>man-rep groups → distributors → their reps → end-users</b>. This CRM tracks who\'s been demo\'d, trained and is actually selling. Accounts &amp; contacts are split <b>East / West</b> by state — John works West, Jamie works East, Max sees everything.</p>'+
   rows.map(r=>'<div class="tk" style="align-items:flex-start"><b style="flex:none;width:96px;font-size:13px;padding-top:1px">'+r[0]+'</b><span style="font-size:13px;color:var(--muted)">'+r[1]+'</span></div>').join("")+
   '<button class="btn coral block" data-act="closehelp" style="margin-top:14px">Got it</button>');
}
function exportCSV(){
  const rows=[["Distributor","Region","State","Units","Revenue","Orders","Last order","Demo units out"]];
  DB.companies.filter(c=>c.type==="distributor"&&((c.units||0)>0||(c.orders||0)>0||(c.demoCount||0)>0))
    .sort((a,b)=>(b.units||0)-(a.units||0))
    .forEach(c=>rows.push([c.name,companyRegion(c),c.state||"",c.units||0,c.revenue||0,c.orders||0,c.lastOrder||"",c.demoCount||0]));
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="autotq_distributor_volume.csv";a.click();toast("Exported");
}

document.addEventListener("click",e=>{

  if(a==="pwmode"){logState.pwMode=t.dataset.mode;renderLogin();return;}
  if(a==="pwset"){setPw();return;}
  if(a==="pwsignin"){signInPw();return;}
  if(a==="sendotp"){sendOtp(t.dataset.email);return;}
  if(a==="verifyotp"){verifyOtp();return;}
  if(a==="otpback"){logState={};renderLogin();return;}
  if(a==="nav"){view=t.dataset.view;listQ="";if(view==="map")mapState=null;render();window.scrollTo(0,0);return;}
  if(a==="stpop"){stPop(t.dataset.st);return;}

  if(a==="acctfilter"){acctFilter=t.dataset.v;listQ="";render();return;}
  if(a==="contactfilter"){contactFilter=t.dataset.v;listQ="";contactStateF="";render();return;}
  if(a==="demoview"){demoView=t.dataset.v;render();return;}
  if(a==="settask"){logState.taskType=t.dataset.v;document.querySelectorAll("#taskTypes .qchip").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="addtask"){const ti=document.getElementById("taskTitle"),dd=document.getElementById("taskDue");const title=(ti?ti.value:"").trim();if(!title){toast("Type an action first");return;}ensureTasks();DB.tasks.unshift({id:uid(),owner:USER,title:title,type:logState.taskType||"todo",due:(dd&&dd.value)||todayStr(),done:false,createdAt:new Date().toISOString()});save();render();refocus("taskTitle");return;}
  if(a==="toggletask"){const tk=DB.tasks.find(x=>x.id===id);if(tk){tk.done=!tk.done;tk.completedAt=tk.done?new Date().toISOString():null;tk.completedDay=tk.done?todayStr():null;}save();render();return;}
  if(a==="deltask"){DB.tasks=(DB.tasks||[]).filter(x=>x.id!==id);save();render();return;}
  if(a==="setdstatus"){const c=company(id);if(c){c.dstatus=t.dataset.v;save();render();toast(c.name+" → "+(t.dataset.v==="setup"?"Set-up":"Potential"));}return;}
  if(a==="setestage"){const c=company(id);if(c){c.estage=t.dataset.v;save();render();}return;}
  if(a==="schedfu"){formFollowup(id);return;}
  if(a==="saveFu"){saveFollowup();return;}
  if(a==="coverage"){formCoverage(id);return;}
  if(a==="saveCov"){saveCoverage();return;}
  if(a==="addopp"){formOpp(null);return;}
  if(a==="editopp"){formOpp(id);return;}
  if(a==="newoppfor"){formOpp(null,id);return;}
  if(a==="delopp"){DB.opps=(DB.opps||[]).filter(x=>x.id!==id);save();closeSheet();render();toast("Opportunity removed");return;}
  if(a==="setOppStage"){logState.oppStage=t.dataset.v;document.querySelectorAll("#oStage .chip").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="saveOpp"){saveOpp();return;}
  if(a==="oppview"){oppView=t.dataset.v;render();return;}
  if(a==="oppfilter"){oppFilter=t.dataset.v;render();return;}
  if(a==="oppadv"){e.stopPropagation();const o=DB.opps.find(x=>x.id===id);if(o){const i=OPP_STAGES.indexOf(o.stage)+parseInt(t.dataset.dir,10);if(i>=0&&i<4){o.stage=OPP_STAGES[i];o.probability=OPP_PROB[o.stage];save();render();toast(o.name+" → "+OPP_SHORT[o.stage]);}}return;}
  if(a==="oppclose"){e.stopPropagation();const o=DB.opps.find(x=>x.id===id);if(o){o.stage=t.dataset.v;o.probability=OPP_PROB[o.stage];if(!o.closeDate)o.closeDate=todayStr();save();render();toast(o.name+" → "+OPP_SHORT[o.stage]);}return;}
  if(a==="openreport"){curReport=t.dataset.id;sortState.report={key:0,dir:1};view="report";render();window.scrollTo(0,0);return;}
  if(a==="repsort"){const k=parseInt(t.dataset.key,10);const s=sortState.report;if(s.key===k)s.dir=-s.dir;else{s.key=k;s.dir=1;}render();return;}
  if(a==="repcsv"){reportCSV(t.dataset.id);return;}
  if(a==="editacct"){formEditAccount(id);return;}
  if(a==="saveAcct"){saveAcct();return;}
  if(a==="editperson"){formEditPerson(id);return;}
  if(a==="savePerson"){savePerson();return;}
  if(a==="logacct"){formLogAcct(id);return;}
  if(a==="saveLogAcct"){saveLogAcct();return;}
  if(a==="confleads"){curConf=t.dataset.conf;leadFilter="tocall";listQ="";view="confleads";render();window.scrollTo(0,0);return;}
  if(a==="leadfilter"){leadFilter=t.dataset.v;render();return;}
  if(a==="leadopen"){formLead(id);return;}
  if(a==="setLeadC"){logState.leadC=t.dataset.v;document.querySelectorAll("#ldC .chip").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="setLeadT"){logState.leadT=t.dataset.v;document.querySelectorAll("#ldT .chip").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="saveLead"){saveLead();return;}
  if(a==="leadpromote"){promoteLead(t.dataset.id);return;}
  if(a==="addsku"){openSheet('<h2>Add a SKU</h2><p style="color:var(--muted);font-size:14px;margin:0 0 4px">Adds to the catalog on every distributor page.</p>'+
    '<label class="fl">Our part # (MPN)</label><input class="f" id="skuMpn" placeholder="e.g. 7000-XX">'+
    '<label class="fl">Product name</label><input class="f" id="skuName" placeholder="e.g. Replacement battery pack">'+
    '<label class="fl">UPC (optional)</label><input class="f" id="skuUpc" inputmode="numeric" placeholder="8600115371XX">'+
    '<button class="btn coral block" data-act="savesku" style="margin-top:18px">Add SKU</button>');return;}
  if(a==="savesku"){const mpn=val("skuMpn"),nm=val("skuName");
    if(!mpn||!nm){toast("Part # and name are both needed");return;}
    DB.skus=DB.skus||[];DB.skus.push({id:uid(),mpn:mpn,name:nm,upc:val("skuUpc")});
    save();closeSheet();render();toast(mpn+" added to the catalog");return;}
  if(a==="pncsv"){pnCSV(id);return;}
  if(a==="addpncol"){formPnCol(t.dataset.cid,null);return;}
  if(a==="pncolopts"){formPnCol(t.dataset.cid,t.dataset.col);return;}
  if(a==="savepncol"){const c=company(logState.pnCid);if(!c)return;
    const name=val("pnColName");if(!name){toast("Name the column");return;}
    if(logState.pnCol){const col=c.pnCols.find(x=>x.id===logState.pnCol);if(col)col.label=name;}
    else c.pnCols.push({id:uid(),label:name});
    save();closeSheet();render();return;}
  if(a==="delpncol"){const c=company(logState.pnCid);if(!c)return;
    const col=c.pnCols.find(x=>x.id===logState.pnCol);if(!col)return;
    const hasData=Object.values(c.pnData||{}).some(r=>r[col.id]);
    if(hasData&&!confirm('Delete column "'+col.label+'" and everything typed in it?'))return;
    c.pnCols=c.pnCols.filter(x=>x.id!==col.id);
    Object.values(c.pnData||{}).forEach(r=>{delete r[col.id];});
    save();closeSheet();render();return;}
  if(a==="addpnrow"){formPnRow(t.dataset.cid);return;}
  if(a==="savepnrow"){const c=company(logState.pnCid);if(!c)return;
    const mpn=val("pnRowMpn"),nm=val("pnRowName");
    if(!mpn){toast("Give the row a part # or label");return;}
    ensurePnGrid(c);c.pnRows.push({id:uid(),mpn:mpn,name:nm});
    save();closeSheet();render();return;}
  if(a==="delpnrow"){const c=company(t.dataset.cid);if(!c)return;
    const row=t.dataset.row;const r=(c.pnRows||[]).find(x=>x.id===row);
    const hasData=Object.keys((c.pnData||{})[row]||{}).length;
    if(r&&(!hasData||confirm('Delete the row "'+r.mpn+'"?'))){
      c.pnRows=c.pnRows.filter(x=>x.id!==row);delete c.pnData[row];
      save();render();}
    return;}
  if(a==="mapmode"){mapMode=t.dataset.v;mapState=null;render();return;}
  if(a==="resupload"){formResUpload(t.dataset.cid||null);return;}
  if(a==="ressave"){saveResources();return;}
  if(a==="resdl"){resOpen(id);return;}
  if(a==="resdel"){const r=RES.find(x=>x.id===id);if(r&&confirm('Delete "'+r.name+'" from the library?')){resRemove(id).then(resRefresh).then(()=>{render();toast("Deleted");});}return;}
  if(a==="openfolder"){curFolder=t.dataset.id||null;view="resources";render();return;}
  if(a==="reslayout"){resLayout=t.dataset.v;localStorage.setItem("autotq_res_layout",resLayout);render();return;}
  if(a==="newbubble"){formNewBubble();return;}
  if(a==="bubblesave"){saveBubble();return;}
  if(a==="foldel"){const f=folderById(id);if(f&&!folderCount(id)&&confirm('Delete the empty folder "'+f.name+'"?')){const parent=f.parent||null;resRemove(id).then(resRefresh).then(()=>{curFolder=parent;render();toast("Folder deleted");});}return;}
  if(a==="fcell"){fSel=t.dataset.cat?{cat:t.dataset.cat,period:t.dataset.period}:null;render();return;}
  if(a==="help"){helpSheet();return;}
  if(a==="closehelp"){localStorage.setItem(HKEY,"1");closeSheet();if(view==="today")render();return;}
  if(a==="dismissonboard"){localStorage.setItem(HKEY,"1");render();return;}
  if(a==="oppAttach"){const pid=document.getElementById("oConPid").value,role=document.getElementById("oConRole").value;
    if(!pid){toast("Pick a person first");return;}
    logState.oppContacts=logState.oppContacts||[];
    if(!logState.oppContacts.some(x=>x.pid===pid))logState.oppContacts.push({pid:pid,role:role});
    document.getElementById("oppCons").innerHTML=oppConChips();return;}
  if(a==="oppDetach"){logState.oppContacts.splice(parseInt(t.dataset.i,10),1);
    document.getElementById("oppCons").innerHTML=oppConChips();return;}
  if(a==="menu"){menu();return;}
  if(a==="switch"){if(!confirm("Sign out of the CRM on this device?"))return;
    if(authed())fetch(SUPA_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SESSION.access_token}}).catch(()=>{});
    saveSession(null);localStorage.removeItem(UKEY);USER=null;logState={};closeSheet();render();return;}
  if(a==="reset"){if(!confirm("Reset local data? Deals, tasks, logged calls and lead statuses entered in this browser will be lost. Back up first if unsure."))return;DB=seed();save();closeSheet();view="today";render();toast("Data reset to the seed");return;}
  if(a==="backup"){backupDB();return;}
  if(a==="restorepick"){formRestore();return;}
  if(a==="restoredo"){doRestore();return;}
  if(a==="addhub"){addHub();return;}
  if(a==="travel"){formTravel();return;}
  if(a==="form"){const f=t.dataset.form;
    if(f==="distributor")formDistributor();else if(f==="enduser")formSimpleCompany("enduser","end-user");
    else if(f==="rep")formRep();else formLog(null,f==="call"?"call":f);return;}
  if(a==="person"){curPerson=id;view="person";render();window.scrollTo(0,0);return;}
  if(a==="roster"){curCompany=id;view="roster";render();window.scrollTo(0,0);return;}

  if(a==="logemail"){formLog(id,"email");return;}
  if(a==="setType"){logState.logType=t.dataset.v;document.querySelectorAll("#logTiles .tile").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="setOut"){logState.outcome=t.dataset.v;document.querySelectorAll("#logOut .chip").forEach(x=>x.classList.toggle("on",x.dataset.v===t.dataset.v));return;}
  if(a==="map"){mapState=null;view="map";render();window.scrollTo(0,0);return;}
  if(a==="mapstate"){mapState=t.dataset.st;render();return;}
  if(a==="noop"){return;}
  if(a==="saveDist"){saveDist();return;}
  if(a==="saveEnd"){saveEnd(t.dataset.type);return;}
  if(a==="saveRep"){saveRep();return;}
  if(a==="saveLog"){saveLog();return;}
  if(a==="export"){exportCSV();return;}
});
document.addEventListener("input",e=>{
  if(e.target.classList&&e.target.classList.contains("pncell")){
    const c=company(e.target.dataset.cid);if(!c)return;
    ensurePnGrid(c);
    const row=e.target.dataset.row,col=e.target.dataset.col,v=e.target.value.trim();
    c.pnData[row]=c.pnData[row]||{};
    if(v)c.pnData[row][col]=v;else delete c.pnData[row][col];
    if(col==="c1"){c.partNos=c.partNos||{};if(v)c.partNos[row]=v;else delete c.partNos[row];}
    save();return; // no re-render — keep focus while typing
  }
  if(e.target.id==="dName")renderFill(e.target.value);
  if(e.target.id==="travelState")renderTravel();
  if(e.target.id==="gsearch"){searchQ=e.target.value;view=searchQ.trim()?"search":"today";render();refocus("gsearch");}
  if(e.target.id==="lvsearch"){listQ=e.target.value;render();refocus("lvsearch");}
  if(e.target.id==="contactState"){contactStateF=e.target.value;render();}
});
function refocus(idv){const el=document.getElementById(idv);if(el){const v=el.value;el.focus();try{el.setSelectionRange(v.length,v.length);}catch(_){}}}

load();applyManrepPersonCoverage();
USER=authed()?(TEAM_EMAILS[((SESSION.user&&SESSION.user.email)||"").toLowerCase()]||localStorage.getItem(UKEY)||""):null;
render();
if(authed())bootSync();
</script>
